name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

  changeset-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check for changeset
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Allow PRs with "chore:" or "ci:" prefix to skip changeset
          if echo "$PR_TITLE" | grep -qE '^(chore|ci|docs|test):'; then
            echo "Skipping changeset check for non-release PR"
            exit 0
          fi
          pnpm changeset status --since=origin/main
