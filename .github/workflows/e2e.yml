name: E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *" # Daily at 08:00 UTC

permissions:
  contents: read
  models: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Run E2E tests (real LLM via GitHub Models)
        run: pnpm test:e2e
        env:
          GITHUB_TOKEN: ${{ github.token }}
